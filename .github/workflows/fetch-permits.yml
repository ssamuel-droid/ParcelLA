name: Fetch LA City Permit Data

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  fetch-permits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch LA City Data and Push to Supabase
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SOCRATA_APP_TOKEN:    ${{ secrets.SOCRATA_APP_TOKEN }}
        run: |
          cat > /tmp/sync.mjs << 'JSEOF'
          import https from 'https';
          import { URL } from 'url';

          const SUPABASE_URL = process.env.SUPABASE_URL.replace(/\/$/, '');
          const SUPABASE_KEY = process.env.SUPABASE_SERVICE_KEY;
          const TOKEN        = process.env.SOCRATA_APP_TOKEN;

          console.log('Supabase URL:', SUPABASE_URL);
          console.log('Token prefix:', TOKEN?.slice(0,8));

          function request(urlStr, options = {}, body = null) {
            return new Promise((resolve, reject) => {
              const u = new URL(urlStr);
              const opts = {
                hostname: u.hostname,
                path:     u.pathname + u.search,
                method:   options.method || 'GET',
                headers:  options.headers || {},
              };
              if (body) opts.headers['Content-Length'] = Buffer.byteLength(body);
              const req = https.request(opts, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => resolve({ status: res.statusCode, body: data }));
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          async function fetchDataset(id, orderField, where = null) {
            const params = new URLSearchParams({ '$limit': '500', '$order': `${orderField} DESC` });
            if (where) params.set('$where', where);
            const url = `https://data.lacity.org/resource/${id}.json?${params.toString()}`;
            console.log('Fetching:', `https://data.lacity.org/resource/${id}.json`, where ? `(filtered: ${where})` : '');
            const r = await request(url, {
              headers: { 'Accept': 'application/json' }  // no token — public datasets
            });
            console.log(`  HTTP ${r.status}`);
            if (r.status !== 200) throw new Error('HTTP ' + r.status);
            return JSON.parse(r.body);
          }

          async function upsertToSupabase(records) {
            const url = `${SUPABASE_URL}/rest/v1/permits?on_conflict=permit_number`;
            const body = JSON.stringify(records);
            const r = await request(url, {
              method: 'POST',
              headers: {
                'Content-Type':  'application/json',
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'apikey':        SUPABASE_KEY,
                'Prefer':        'resolution=merge-duplicates',
              }
            }, body);
            console.log(`  Supabase upsert HTTP ${r.status}`);
            if (r.status >= 400) console.log('  Error:', r.body.slice(0, 200));
            return r.status;
          }

          const DATASETS = [
            // Filter for permits that are ISSUED but not yet finaled/expired
            // These are active development opportunities
            // RTI = Ready to Issue: fully approved, not yet started
            // Also include "Issued" but flag separately — may or may not have started
            { id: 't57t-h8jb', name: 'DBS Permits',       order: 'issue_date',
              where: "status='Ready to Issue'" },
            { id: '6q2s-9pnn', name: 'Building Permits',   order: 'permitissuancedate',
              where: "permitstatus='Ready to Issue'" },
            { id: 'hbkd-qubn', name: 'LADBS Community',    order: 'permitissuancedate',
              where: "permitstatus='Ready to Issue'" },
            { id: 'cpkv-aajs', name: 'New Housing Units',  order: 'date',
              where: null },  // keep all housing unit records
            { id: 'w53t-rwwp', name: 'Permit Valuations',  order: 'issueddate',
              where: null },
            { id: 'peyn-q7x3', name: 'DBS Permits 2',      order: 'issueddate',
              where: null },
          ];

          let total = 0;
          for (const ds of DATASETS) {
            console.log(`\n--- ${ds.name} (${ds.id}) ---`);
            try {
              const records = await fetchDataset(ds.id, ds.order, ds.where);
              console.log(`  Got ${records.length} records`);
              if (!records.length) continue;

              const rows = records.map((r, i) => ({
                permit_number: String(r.permitnumber || r.permit_number || r.pcisid || r.id || `${ds.id}-${i}`).slice(0, 100),
                permit_type:   ds.name,
                status:        String(r.status || r.permitstatus || 'Ready to Issue').slice(0, 50),
                is_rti:        true,  // all records filtered to RTI status
                address:       String(r.address || r.streetaddress || r.location_address || '').slice(0, 255),
                units:         parseInt(r.units || r.net_units || r.numberofunits || '0') || 0,
                valuation:     parseFloat(r.valuation || r.permit_valuation || '0') || 0,
                issued_date:   (r.issueddate || r.permitissuancedate || r.issue_date || r.date || '').split('T')[0] || null,
                raw_data:      r,
                synced_at:     new Date().toISOString(),
              }));

              await upsertToSupabase(rows);
              total += rows.length;
            } catch(e) {
              console.log(`  FAILED: ${e.message}`);
            }
          }
          console.log(`\n=== TOTAL: ${total} records synced ===`);
          JSEOF
          node /tmp/sync.mjs
