name: Fetch LA City Permit Data

on:
  schedule:
    - cron: '0 10 * * *'  # 2AM PT daily
  workflow_dispatch:        # Manual trigger button in GitHub UI

jobs:
  fetch-permits:
    runs-on: ubuntu-latest  # GitHub US servers — not blocked by LA City

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch LA City Data and Push to Supabase
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SOCRATA_APP_TOKEN:    ${{ secrets.SOCRATA_APP_TOKEN }}
        run: |
          node -e "
          const https = require('https');

          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_KEY = process.env.SUPABASE_SERVICE_KEY;
          const TOKEN = process.env.SOCRATA_APP_TOKEN;

          function supabaseUpsert(table, records) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify(records);
              const url = new URL('/rest/v1/' + table, SUPABASE_URL);
              const req = https.request({
                hostname: url.hostname,
                path: url.pathname + '?on_conflict=permit_number',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Bearer ' + SUPABASE_KEY,
                  'apikey': SUPABASE_KEY,
                  'Prefer': 'resolution=merge-duplicates',
                  'Content-Length': Buffer.byteLength(body)
                }
              }, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => resolve({ status: res.statusCode, data }));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          function fetchDataset(id, orderField) {
            return new Promise((resolve, reject) => {
              const path = '/resource/' + id + '.json?\$limit=500&\$order=' + orderField + '+DESC';
              const req = https.request({
                hostname: 'data.lacity.org',
                path,
                headers: { 'Accept': 'application/json', 'X-App-Token': TOKEN }
              }, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  console.log('Dataset', id, 'HTTP', res.statusCode);
                  if (res.statusCode !== 200) { reject(new Error('HTTP ' + res.statusCode)); return; }
                  try { resolve(JSON.parse(data)); } catch(e) { reject(e); }
                });
              });
              req.on('error', reject);
              req.end();
            });
          }

          const DATASETS = [
            { id: '6q2s-9pnn', name: 'Building Permits',     order: 'permitissuancedate' },
            { id: 'hbkd-qubn', name: 'LADBS Community',      order: 'permitissuancedate' },
            { id: 'cpkv-aajs', name: 'New Housing Units',    order: 'date' },
            { id: 'w53t-rwwp', name: 'Permit Valuations',    order: 'issueddate' },
            { id: 't57t-h8jb', name: 'DBS Permits',          order: 'issue_date' },
            { id: 'peyn-q7x3', name: 'DBS Permits 2',        order: 'issueddate' },
          ];

          async function main() {
            let total = 0;
            for (const ds of DATASETS) {
              try {
                const records = await fetchDataset(ds.id, ds.order);
                console.log(ds.name + ': ' + records.length + ' records');
                if (!records.length) continue;

                const rows = records.map((r, i) => ({
                  permit_number: String(r.permitnumber || r.permit_number || r.pcisid || r.id || ds.id+'-'+i).slice(0,100),
                  permit_type:   ds.name,
                  status:        String(r.status || r.permitstatus || 'Active').slice(0,50),
                  address:       String(r.address || r.streetaddress || r.location_address || '').slice(0,255),
                  units:         parseInt(r.units || r.net_units || r.numberofunits || '0') || 0,
                  valuation:     parseFloat(r.valuation || r.permit_valuation || '0') || 0,
                  issued_date:   (r.issueddate || r.permitissuancedate || r.issue_date || r.date || '').split('T')[0] || null,
                  raw_data:      r,
                  synced_at:     new Date().toISOString(),
                }));

                const result = await supabaseUpsert('permits', rows);
                console.log('Upserted', rows.length, '→ Supabase HTTP', result.status);
                total += rows.length;
              } catch(e) {
                console.log('FAILED:', ds.name, '-', e.message);
              }
            }
            console.log('TOTAL SYNCED:', total);
          }

          main().catch(console.error);
          "
