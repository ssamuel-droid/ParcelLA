name: Fetch LA City Permit Data

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  fetch-permits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and sync permits
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');

          const SB_URL = process.env.SUPABASE_URL.replace(/\/$/, '');
          const SB_KEY = process.env.SUPABASE_SERVICE_KEY;

          function get(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { 'Accept': 'application/json' } }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => {
                  console.log(url.split('?')[0], '→ HTTP', res.statusCode);
                  if (res.statusCode === 200) resolve(JSON.parse(d));
                  else reject(new Error('HTTP ' + res.statusCode + ': ' + d.slice(0,300)));
                });
              }).on('error', reject);
            });
          }

          function upsert(rows) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify(rows);
              const u = new URL(SB_URL + '/rest/v1/permits');
              const req = https.request({
                hostname: u.hostname,
                path: u.pathname + '?on_conflict=permit_number',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Bearer ' + SB_KEY,
                  'apikey': SB_KEY,
                  'Prefer': 'return=minimal,resolution=merge-duplicates',
                  'Content-Length': Buffer.byteLength(body)
                }
              }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve({ status: res.statusCode, body: d }));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function fetchAll(baseUrl, offsetStep = 1000) {
            let all = [];
            let offset = 0;
            while (true) {
              const url = `${baseUrl}&$limit=${offsetStep}&$offset=${offset}`;
              const records = await get(url);
              if (!records.length) break;
              all = all.concat(records);
              console.log(`  Fetched ${all.length} so far...`);
              if (records.length < offsetStep) break;
              offset += offsetStep;
              if (all.length > 50000) break; // safety cap
            }
            return all;
          }

          async function syncDataset(name, baseUrl, buildRow) {
            console.log(`\n=== ${name} ===`);
            try {
              const records = await fetchAll(baseUrl);
              console.log(`Total: ${records.length} records`);

              let synced = 0;
              for (let i = 0; i < records.length; i += 100) {
                const batch = records.slice(i, i + 100);
                const rows = batch.map((r, j) => buildRow(r, i + j)).filter(Boolean);
                const result = await upsert(rows);
                if (result.status < 300) synced += rows.length;
                else console.log('Batch error:', result.status, result.body.slice(0,100));
              }
              console.log(`Synced: ${synced}`);
              return synced;
            } catch(e) {
              console.log('FAILED:', e.message);
              return 0;
            }
          }

          async function main() {
            let total = 0;

            // ── t57t-h8jb: DBS Permits — filter RTI/entitled only ─────────────
            // Status values we want: Ready to Issue, Issued (not Finaled/Expired/Cancelled)
            // permit_type filter: Bldg-New (new construction) 
            total += await syncDataset(
              'DBS Permits (RTI & Issued)',
              'https://data.lacity.org/resource/t57t-h8jb.json' +
              '?$order=issue_date+DESC' +
              "&$where=(permit_type='Bldg-New'+OR+permit_type='Bldg-Addition')" +
              "+AND+(latest_status='Ready+to+Issue'" +
              "+OR+latest_status='Issued'" +
              "+OR+latest_status='Plan+Check')",
              (r, i) => {
                const addr = `${r.address_start||''} ${r.street_direction||''} ${r.street_name||''} ${r.street_suffix||''}`.trim();
                const pnum = String(r.pcis_permit || `t57t-${i}`).slice(0,100);
                const status = String(r.latest_status || 'Active');
                const units = parseInt(r.of_residential_dwelling_units || '0') || 0;
                // Include all residential including SFR+ADU
                if (!addr && !pnum.startsWith('t57t')) return null;
                return {
                  permit_number: pnum,
                  permit_type:   'Bldg-New',
                  status:        status,
                  address:       addr.slice(0,255),
                  units:         units,
                  valuation:     parseFloat(r.valuation || '0') || 0,
                  issued_date:   (r.issue_date || '').split('T')[0] || null,
                  is_rti:        status.toLowerCase().includes('ready'),
                  zone:          r.zone || null,
                  raw_data:      r,
                  synced_at:     new Date().toISOString(),
                };
              }
            );

            // ── hbkd-qubn: LADBS Community permits ───────────────────────────
            total += await syncDataset(
              'LADBS Community Permits',
              'https://data.lacity.org/resource/hbkd-qubn.json?$limit=1000',
              (r, i) => ({
                permit_number: String(r.permit_nbr || r.permitnumber || `hbkd-${i}`).slice(0,100),
                permit_type:   'LADBS',
                status:        String(r.status || r.permit_status || 'Active').slice(0,50),
                address:       String(r.address || r.site_address || '').slice(0,255),
                units:         parseInt(r.units || '0') || 0,
                valuation:     parseFloat(r.valuation || '0') || 0,
                issued_date:   (r.issue_date || r.issued_date || '').split('T')[0] || null,
                is_rti:        String(r.status || '').toLowerCase().includes('ready'),
                raw_data:      r,
                synced_at:     new Date().toISOString(),
              })
            );

            console.log('\n=============================');
            console.log('TOTAL SYNCED:', total, 'records');
            console.log('=============================');
          }

          main().catch(console.error);
          EOF
