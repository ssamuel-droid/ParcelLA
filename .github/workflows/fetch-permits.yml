name: Fetch LA City Permit Data

on:
  schedule:
    - cron: '0 10 * * *'  # 2AM PT daily (GitHub Actions runs in UTC)
  workflow_dispatch:        # Manual trigger button in GitHub UI

jobs:
  fetch-permits:
    runs-on: ubuntu-latest  # GitHub's US-based servers — not blocked by LA City

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch LA City Permit Data
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SOCRATA_APP_TOKEN:   ${{ secrets.SOCRATA_APP_TOKEN }}
          SOCRATA_APP_ID:      ${{ secrets.SOCRATA_APP_ID }}
        run: |
          node -e "
          const https = require('https');
          const { createClient } = require('@supabase/supabase-js');

          const sb = createClient(
            process.env.SUPABASE_URL,
            process.env.SUPABASE_SERVICE_KEY
          );

          const TOKEN = process.env.SOCRATA_APP_TOKEN;
          const DATASETS = [
            { id: 'cpkv-aajs', name: 'New Housing Units', dateField: 'date' },
            { id: 'hbkd-qubn', name: 'LADBS Community Permits', dateField: 'permitissuancedate' },
            { id: 't57t-h8jb', name: 'DBS Permits', dateField: 'issue_date' },
            { id: 'w53t-rwwp', name: 'Permit Valuations', dateField: 'issueddate' },
            { id: '6q2s-9pnn', name: 'Building Permits Official', dateField: 'permitissuancedate' },
            { id: 'peyn-q7x3', name: 'DBS Permits 2', dateField: 'issueddate' },
          ];

          function fetchDataset(datasetId, dateField) {
            return new Promise((resolve, reject) => {
              const url = \`https://data.lacity.org/resource/\${datasetId}.json?\\\$limit=500&\\\$order=\${dateField}+DESC\`;
              const options = {
                headers: {
                  'Accept': 'application/json',
                  'X-App-Token': TOKEN,
                }
              };
              console.log('Fetching:', url);
              https.get(url, options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  console.log('HTTP', res.statusCode, 'for', datasetId);
                  if (res.statusCode !== 200) {
                    reject(new Error('HTTP ' + res.statusCode));
                    return;
                  }
                  try { resolve(JSON.parse(data)); }
                  catch(e) { reject(e); }
                });
              }).on('error', reject);
            });
          }

          async function main() {
            let totalSynced = 0;

            for (const ds of DATASETS) {
              try {
                console.log('\\n--- Trying', ds.name, '(' + ds.id + ') ---');
                const records = await fetchDataset(ds.id, ds.dateField);
                console.log('Got', records.length, 'records');

                if (!records.length) continue;

                // Upsert into Supabase permits table
                let synced = 0;
                for (const r of records) {
                  try {
                    const permitNum = r.permitnumber || r.permit_number || r.pcisid || 
                                     r.id || (ds.id + '-' + synced);
                    const address = r.address || r.location_address || r.streetaddress || '';
                    const units = parseInt(r.units || r.net_units || r.numberofunits || '0') || 0;
                    const valuation = parseFloat(r.valuation || r.permit_valuation || r.estimatedvaluation || '0') || 0;
                    const status = r.status || r.permitstatus || 'Active';
                    const issuedDate = r.issueddate || r.permitissuancedate || r.issue_date || r.date || null;

                    await sb.from('permits').upsert({
                      permit_number:    String(permitNum).slice(0, 100),
                      permit_type:      ds.name,
                      status:           String(status).slice(0, 50),
                      address:          String(address).slice(0, 255),
                      units:            units,
                      valuation:        valuation,
                      issued_date:      issuedDate ? issuedDate.split('T')[0] : null,
                      raw_data:         r,
                      synced_at:        new Date().toISOString(),
                    }, { onConflict: 'permit_number' });
                    synced++;
                  } catch(e) { /* skip individual errors */ }
                }

                console.log('Synced', synced, 'records from', ds.name);
                totalSynced += synced;

                // Log to sync_log
                await sb.from('sync_log').insert({
                  source: ds.name, records: synced, status: 'ok'
                }).catch(() => {});

              } catch(e) {
                console.log('Failed:', ds.name, '-', e.message);
                await sb.from('sync_log').insert({
                  source: ds.name, status: 'error', error: e.message
                }).catch(() => {});
              }
            }

            console.log('\\n=== TOTAL SYNCED:', totalSynced, 'records ===');
          }

          main().catch(console.error);
          "

      - name: Done
        run: echo "LA City permit sync complete"
