name: Fetch LA City Permit Data

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  fetch-permits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and sync permits
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');

          const SB_URL = process.env.SUPABASE_URL.replace(/\/$/, '');
          const SB_KEY = process.env.SUPABASE_SERVICE_KEY;

          // Simple HTTPS GET
          function get(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { 'Accept': 'application/json' } }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => {
                  console.log(url.split('?')[0], '→ HTTP', res.statusCode);
                  if (res.statusCode === 200) resolve(JSON.parse(d));
                  else reject(new Error('HTTP ' + res.statusCode + ': ' + d.slice(0,100)));
                });
              }).on('error', reject);
            });
          }

          // Supabase upsert
          function upsert(rows) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify(rows);
              const u = new URL(SB_URL + '/rest/v1/permits?on_conflict=permit_number');
              const req = https.request({
                hostname: u.hostname, path: u.pathname + u.search,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Bearer ' + SB_KEY,
                  'apikey': SB_KEY,
                  'Prefer': 'resolution=merge-duplicates',
                  'Content-Length': Buffer.byteLength(body)
                }
              }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => {
                  console.log('Supabase →', res.statusCode, d.slice(0,100));
                  resolve(res.statusCode);
                });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function main() {
            let total = 0;

            // t57t-h8jb worked before — start with this one, no filters
            const datasets = [
              'https://data.lacity.org/resource/t57t-h8jb.json?$limit=500&$order=issue_date+DESC',
              'https://data.lacity.org/resource/hbkd-qubn.json?$limit=500&$order=permitissuancedate+DESC',
              'https://data.lacity.org/resource/cpkv-aajs.json?$limit=500&$order=date+DESC',
              'https://data.lacity.org/resource/w53t-rwwp.json?$limit=500&$order=issueddate+DESC',
              'https://data.lacity.org/resource/peyn-q7x3.json?$limit=500&$order=issueddate+DESC',
              'https://data.lacity.org/resource/6q2s-9pnn.json?$limit=500&$order=permitissuancedate+DESC',
            ];

            for (const url of datasets) {
              try {
                const records = await get(url);
                console.log('Got', records.length, 'records');
                if (!records.length) continue;

                const rows = records.map((r, i) => ({
                  permit_number: String(r.pcis_permit || r.permitnumber || r.permit_number || r.id || `rec-${i}`).slice(0,100),
                  permit_type:   'LADBS',
                  status:        String(r.latest_status || r.status || r.permitstatus || 'Active').slice(0,50),
                  address:       String(r.address || (r.address_start ? r.address_start+' '+r.street_name+' '+r.street_suffix : '') || '').slice(0,255),
                  units:         parseInt(r.of_residential_dwelling_units || r.units || '0') || 0,
                  valuation:     parseFloat(r.valuation || '0') || 0,
                  issued_date:   (r.issue_date || r.issueddate || r.permitissuancedate || r.date || '').split('T')[0] || null,
                  is_rti:        (r.latest_status || r.status || '').toLowerCase().includes('ready'),
                  raw_data:      r,
                  synced_at:     new Date().toISOString(),
                }));

                const status = await upsert(rows);
                if (status < 300) total += rows.length;
              } catch(e) {
                console.log('FAILED:', e.message);
              }
            }
            console.log('\nTOTAL SYNCED:', total);
          }

          main().catch(console.error);
          EOF
