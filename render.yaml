# ParceLLA — Render deployment config
# render.yaml — alternative to Railway

services:
  - type: web
    name: parcella-api
    env: node
    plan: starter          # $7/mo — upgrade to standard for production
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Set these in Render dashboard (never commit real keys):
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MAPBOX_TOKEN
        sync: false
      - key: SOCRATA_APP_TOKEN
        sync: false
      - key: CENSUS_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_ENTERPRISE_PRICE_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
